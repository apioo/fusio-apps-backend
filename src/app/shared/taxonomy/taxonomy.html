
<ul ngTree #tree="ngTree" [(values)]="selected" class="fusio-taxonomy">
  <ng-template
    [ngTemplateOutlet]="treeNodes"
    [ngTemplateOutletContext]="{nodes: nodes, parent: tree}"
  />
</ul>
<ng-template #treeNodes let-nodes="nodes" let-parent="parent">
  @for (node of nodes; track node.value) {
    <li
      ngTreeItem
      [parent]="parent"
      [value]="node.value"
      [label]="node.name"
      [disabled]="node.disabled"
      [(expanded)]="node.expanded"
      #treeItem="ngTreeItem"
    >
      <span aria-hidden="true" class="fusio-symbols-outlined expand-icon" translate="no">
        @if (node.children) {
          <i class="bi bi-arrow-right"></i>
        }
      </span>
      <span aria-hidden="true" class="fusio-symbols-outlined" translate="no">
        @if (node.children) {
          <i class="bi bi-folder2"></i>
        }
        @else {
          <i class="bi bi-folder2"></i>
        }
      </span>
      {{ node.name }}
      <span aria-hidden="true" class="fusio-symbols-outlined selected-icon" translate="no">
        <i class="bi bi-check"></i>
      </span>
    </li>
    @if (node.children) {
      <ul role="group">
        <ng-template ngTreeItemGroup [ownedBy]="treeItem" #group="ngTreeItemGroup">
          <ng-template
            [ngTemplateOutlet]="treeNodes"
            [ngTemplateOutletContext]="{nodes: node.children, parent: group}"
          />
        </ng-template>
      </ul>
    }
  }
</ng-template>
