
<h1>
  <a [routerLink]="['/', 'connection']">Connection</a> /
  <a [routerLink]="['/', 'connection', selectedConnection()?.id]">{{selectedConnection()?.name}}</a> /
  <a (click)="doList()">Database</a> /
  {{selected()?.name}}
</h1>

@if (selected(); as selected) {
  <div class="btn-group" role="group">
    <a (click)="doEdit(selected.name)" class="btn btn-primary fusio-btn-update">Update</a>
    <a [routerLink]="['/', 'connection', selectedConnection()?.id, 'database', selected.name, 'data']" class="btn btn-secondary">Data</a>
    <a (click)="doDelete(selected.name)" class="btn btn-danger fusio-btn-delete">Delete</a>
  </div>
  <div class="float-end">
    <button type="button" (click)="jsonView.set(!jsonView())" class="btn btn-outline-secondary fusio-btn-json ms-2">JSON</button>
  </div>
  @if (!jsonView()) {
    <div class="fusio-detail">
      <app-database-table [selected]="selected" [connectionId]="selectedConnection()?.id"></app-database-table>
    </div>
  }
  @if (jsonView()) {
    <div class="fusio-json">
      <div style="height:600px;" class="mt-3">
        <ngx-monaco-editor style="height:100%" name="json" [options]="{theme: 'vs-light', language: 'json'}" [ngModel]="selected|json"></ngx-monaco-editor>
      </div>
    </div>
  }
}
