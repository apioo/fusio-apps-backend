
<h1>
  <a [routerLink]="['/', 'connection']">Connection</a> /
  <a [routerLink]="['/', 'connection', selectedConnection()?.id]">{{selectedConnection()?.name}}</a> /
  Agent
</h1>

<fusio-message [response]="response()"></fusio-message>

<div class="row">
  <div class="col-xl-6">
    @if (input(); as input) {
      <app-agent-message-row [message]="input"></app-agent-message-row>
    }
    @if (output(); as output) {
      <app-agent-message-row [message]="output"></app-agent-message-row>
    }
    <div id="messages-bottom"></div>
    <app-agent-message-input [loading]="loading()" (send)="doSend($event)"></app-agent-message-input>
  </div>
  <div class="col-xl-6">
  </div>
</div>
