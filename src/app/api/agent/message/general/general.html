
<fusio-message [response]="response()"></fusio-message>

<div class="row">
  <div class="col-12">
    @for (message of messages(); track message.id) {
      <app-agent-message-row [message]="message"></app-agent-message-row>
    }
    <div id="messages-bottom"></div>
    <app-agent-message-input [loading]="messagesResource.isLoading()" (send)="doSend($event)"></app-agent-message-input>
  </div>
</div>
