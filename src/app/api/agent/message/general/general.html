
<fusio-message [response]="response()"></fusio-message>

<div class="row">
  <div class="col-12">
    @for (message of messages(); track message.id) {
      <fusio-agent-message-row [message]="message"></fusio-agent-message-row>
    }
    <div id="messages-bottom"></div>
    <fusio-agent-message-input [loading]="messagesResource.isLoading() || loading()" (send)="doSend($event)"></fusio-agent-message-input>
  </div>
</div>
