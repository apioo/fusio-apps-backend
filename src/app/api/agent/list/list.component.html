
<h1>Agent</h1>

<fusio-message [response]="response()"></fusio-message>

<fusio-search
  [searchTerm]="search()"
  (search)="doSearch(1, $event)"
  (newClick)="doNew()"
  placeholder="agent"
  helpPath="api/agent/">
</fusio-search>
<table class="table table-striped">
  <thead>
  <tr>
    <th style="width:100px">Status</th>
    <th style="width:50%">Name</th>
    <th style="width:50%">Description</th>
    <th></th>
  </tr>
  </thead>
  <tbody>
  @for (entry of entries(); track entry.id) {
    <tr>
      <td>
        <div class="text-nowrap">
          @if (entry.public) {
            <span class="badge bg-primary fusio-operation-public"><i class="bi bi-eye" title="Public"></i></span>
          }
          @else {
            <span class="badge bg-info fusio-operation-public"><i class="bi bi-shield-lock" title="Private"></i></span>
          }
        </div>
      </td>
      <td>{{entry.name}}</td>
      <td>{{entry.description}}</td>
      <td>
        <div class="btn-group" role="group">
          <a (click)="doDetail(entry.id)" class="btn btn-primary"><i class="bi bi-search"></i></a>
          <a (click)="doEdit(entry.id)" class="btn btn-secondary"><i class="bi bi-pen"></i></a>
          <a [routerLink]="['/', 'agent', entry.id, 'message']" class="btn btn-secondary"><i class="bi bi-chat"></i></a>
          <a (click)="doDelete(entry.id)" class="btn btn-danger"><i class="bi bi-x"></i></a>
        </div>
      </td>
    </tr>
  }
  </tbody>
</table>
<ngb-pagination
  [page]="page()"
  [pageSize]="pageSize()"
  [collectionSize]="totalResults()"
  [maxSize]="4"
  [ellipses]="false"
  (pageChange)="doSearch($event, search())"></ngb-pagination>
